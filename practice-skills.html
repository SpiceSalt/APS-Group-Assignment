    <script>
        // Simple Interactive Functions
        document.addEventListener('DOMContentLoaded', function() {
            // Search Functionality
            const searchForms = document.querySelectorAll('input[placeholder="Search..."], input[placeholder="Search content..."], input[placeholder="Search titles, descriptions"], input[placeholder="Search Skills"]');
            searchForms.forEach(input => {
                input.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        alert('Search function: You searched for: ' + this.value);
                        this.value = '';
                    }
                });
            });
            
            // Navigation Link Click Effect
            const navLinks = document.querySelectorAll('a[href="#"]');
            navLinks.forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    
                    // Remove active state from sibling links
                    const siblings = Array.from(this.parentElement.parentElement.children);
                    siblings.forEach(sibling => {
                        const siblingLink = sibling.querySelector('a');
                        if (siblingLink) {
                            siblingLink.classList.remove('bg-blue-100', 'text-blue-800', 'font-medium');
                        }
                    });
                    
                    // Add active state to current link
                    this.classList.add('bg-blue-100', 'text-blue-800', 'font-medium');
                    
                    // Show click feedback
                    const linkText = this.textContent.trim();
                    if (linkText !== 'Home') {
                        alert('Navigation function: You clicked on "' + linkText + '", which would take you to the corresponding page.');
                    }
                });
            });
        });
        

    </script>
